<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acik Sinyaller — TV Scanner</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text2: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
      --purple: #bc8cff;
      --orange: #f0883e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'SF Mono', 'Consolas', 'Monaco', monospace; background: var(--bg); color: var(--text); font-size: 13px; }

    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 16px; color: var(--blue); }
    .header-nav { display: flex; gap: 16px; align-items: center; }
    .header-nav a { color: var(--text2); text-decoration: none; font-size: 12px; }
    .header-nav a:hover { color: var(--blue); }
    .header-nav a.active { color: var(--blue); border-bottom: 2px solid var(--blue); padding-bottom: 2px; }

    .toolbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .toolbar label { font-size: 11px; color: var(--text2); margin-right: 4px; }
    .toolbar select, .toolbar input {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
    }
    .toolbar .btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg3);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }
    .toolbar .btn:hover { border-color: var(--blue); }
    .toolbar .btn-refresh { border-color: var(--green); color: var(--green); }

    .summary-bar {
      display: flex;
      gap: 16px;
      padding: 12px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .summary-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
    }
    .summary-stat .label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .summary-stat .value { font-size: 18px; font-weight: bold; margin-top: 2px; }
    .summary-stat .value.positive { color: var(--green); }
    .summary-stat .value.negative { color: var(--red); }
    .summary-stat .value.neutral { color: var(--text); }

    .grade-pills { display: flex; gap: 6px; align-items: center; margin-left: auto; }
    .grade-pill {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
    }
    .grade-pill.A { background: rgba(63,185,80,0.15); color: var(--green); }
    .grade-pill.B { background: rgba(88,166,255,0.15); color: var(--blue); }
    .grade-pill.C { background: rgba(210,153,34,0.15); color: var(--yellow); }

    .signals-container { padding: 16px 20px; }

    .signal-table {
      width: 100%;
      border-collapse: collapse;
    }
    .signal-table th {
      text-align: left;
      padding: 8px 10px;
      font-size: 10px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      cursor: pointer;
      user-select: none;
    }
    .signal-table th:hover { color: var(--blue); }
    .signal-table th .sort-arrow { margin-left: 4px; font-size: 9px; }
    .signal-table td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      vertical-align: middle;
    }
    .signal-table tr:hover { background: rgba(88,166,255,0.04); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: bold;
    }
    .badge.long { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge.short { background: rgba(248,81,73,0.15); color: var(--red); }
    .badge.grade-A { background: rgba(63,185,80,0.2); color: var(--green); }
    .badge.grade-B { background: rgba(88,166,255,0.2); color: var(--blue); }
    .badge.grade-C { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .badge.grade-BEKLE { background: rgba(139,148,158,0.2); color: var(--text2); }

    /* League tabs (Gercek / Sanal / Tumu) */
    .league-tabs {
      display: flex;
      gap: 8px;
      padding: 12px 20px 0;
      margin-bottom: 4px;
      align-items: center;
      flex-wrap: wrap;
    }
    .league-tabs .tab-btn {
      padding: 7px 16px;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #8b949e;
      cursor: pointer;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .league-tabs .tab-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
    .league-tabs .tab-btn.active {
      background: #1f6feb;
      color: #fff;
      border-color: #1f6feb;
    }
    .league-tabs .league-count {
      margin-left: auto;
      color: #8b949e;
      font-size: 12px;
    }

    .pnl-positive { color: var(--green); font-weight: bold; }
    .pnl-negative { color: var(--red); font-weight: bold; }
    .pnl-neutral { color: var(--text2); }

    .tp-dots { display: flex; gap: 4px; }
    .tp-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: bold;
    }
    .tp-dot.hit { background: var(--green); color: #000; }
    .tp-dot.pending { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .tp-dot.sl-hit { background: var(--red); color: #fff; }

    .progress-bar {
      width: 60px;
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
      margin-left: 6px;
    }
    .progress-bar .fill {
      height: 100%;
      border-radius: 3px;
    }
    .progress-bar .fill.positive { background: var(--green); }
    .progress-bar .fill.negative { background: var(--red); }

    .entry-source {
      font-size: 9px;
      color: var(--text2);
      display: block;
      margin-top: 2px;
    }
    .entry-source.smart { color: var(--purple); }

    .age { color: var(--text2); font-size: 11px; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }

    .auto-refresh-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text2);
    }
    .auto-refresh-indicator .dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    .detail-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .detail-modal.visible { display: flex; }
    .detail-content {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    .detail-content h2 { font-size: 16px; margin-bottom: 16px; }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .detail-row .dlabel { color: var(--text2); }
    .detail-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 20px;
      cursor: pointer;
    }

    @media (max-width: 1100px) {
      .signal-table { font-size: 11px; }
      .signal-table td, .signal-table th { padding: 6px; }
    }
    .live-price-cell { font-variant-numeric: tabular-nums; transition: background 0.6s ease, color 0.6s ease; }
    .flash-up { background: rgba(63, 185, 80, 0.25); color: var(--green) !important; }
    .flash-down { background: rgba(248, 81, 73, 0.25); color: var(--red) !important; }
  </style>
</head>
<body>

<div class="header">
  <h1>TV Scanner</h1>
  <div class="header-nav">
    <a href="/">Dashboard</a>
    <a href="/signals.html" class="active">Acik Sinyaller</a>
    <a href="/league.html">Lig Tablosu</a>
  </div>
</div>

<div class="toolbar" id="toolbar">
  <label>Kategori:</label>
  <select id="filterCategory">
    <option value="all">Tumu</option>
    <option value="kripto">Kripto</option>
    <option value="forex">Forex</option>
    <option value="abd_hisse">ABD Hisse</option>
    <option value="bist">BIST</option>
    <option value="emtia">Emtia</option>
  </select>

  <label>Kalite:</label>
  <select id="filterGrade">
    <option value="all">Tumu</option>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
  </select>

  <label>Yon:</label>
  <select id="filterDirection">
    <option value="all">Tumu</option>
    <option value="long">Long</option>
    <option value="short">Short</option>
  </select>

  <label>P&amp;L:</label>
  <select id="filterPnl">
    <option value="all">Tumu</option>
    <option value="positive">Karda</option>
    <option value="negative">Zararda</option>
  </select>

  <button class="btn btn-refresh" onclick="loadSignals()">Yenile</button>
  <button class="btn btn-refresh" onclick="window.location.href='/closed-24h.html'" style="background: #6c757d; color: #fff;">Son 24s Kapanan</button>
  <button class="btn btn-refresh" onclick="window.location.href='/pnl-chart.html'" style="background: #58a6ff; color: #fff;">P&amp;L Grafik</button>
  <button class="btn btn-refresh" onclick="cleanupDuplicates()" style="background: #ff9800; color: #000;">Mukerrer Temizle</button>

  <div class="auto-refresh-indicator">
    <div class="dot"></div>
    <span id="refreshTimer">30s</span>
  </div>
</div>

<div class="league-tabs" id="leagueTabs">
  <button class="tab-btn active" data-league="real">Gercek (GERCEK)</button>
  <button class="tab-btn" data-league="ara">Ara (ARA)</button>
  <button class="tab-btn" data-league="virtual">Sanal (SANAL)</button>
  <button class="tab-btn" data-league="all">Tumu</button>
  <span class="league-count" id="leagueCount"></span>
</div>

<div class="summary-bar" id="summaryBar"></div>

<div class="signals-container">
  <table class="signal-table" id="signalTable">
    <thead>
      <tr>
        <th data-sort="symbol">Sembol <span class="sort-arrow"></span></th>
        <th data-sort="direction">Yon <span class="sort-arrow"></span></th>
        <th data-sort="grade">Kalite <span class="sort-arrow"></span></th>
        <th data-sort="entry">Entry <span class="sort-arrow"></span></th>
        <th data-sort="currentPrice">Guncel <span class="sort-arrow"></span></th>
        <th data-sort="pnlPct">P&amp;L % <span class="sort-arrow"></span></th>
        <th data-sort="pnlPct">P&amp;L ($) <span class="sort-arrow"></span></th>
        <th data-sort="slDistance">SL Uzaklik <span class="sort-arrow"></span></th>
        <th>TP Durumu</th>
        <th data-sort="ageMinutes">Yas <span class="sort-arrow"></span></th>
        <th data-sort="rr">R:R <span class="sort-arrow"></span></th>
        <th>Durum</th>
        <th>Aksiyon</th>
      </tr>
    </thead>
    <tbody id="signalBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none;">
    <p style="font-size: 24px;">Acik sinyal bulunamadi</p>
    <p>Filtreleri kontrol edin veya tarama baslatin.</p>
  </div>
</div>

<div class="detail-modal" id="detailModal">
  <div class="detail-content" id="detailContent"></div>
</div>

<script>
// Safe DOM helper
function el(tag, attrs, children) {
  var node = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      if (k === 'className') node.className = attrs[k];
      else if (k === 'textContent') node.textContent = attrs[k];
      else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(node.style, attrs[k]);
      else node.setAttribute(k, attrs[k]);
    }
  }
  if (children) {
    var arr = Array.isArray(children) ? children : [children];
    for (var i = 0; i < arr.length; i++) {
      if (typeof arr[i] === 'string') node.appendChild(document.createTextNode(arr[i]));
      else if (arr[i]) node.appendChild(arr[i]);
    }
  }
  return node;
}

var allSignals = [];
var summaryData = null;
var currentSort = { key: 'grade', asc: true };
var leagueFilter = 'real'; // 'real' | 'ara' | 'virtual' | 'all'
// Sinyalin league'ini tespit et: scanner yazdiysa onu kullan, yoksa grade bazli
// legacy default. A/B=real, C=ara (yeni default), BEKLE=virtual.
function signalLeague(s) {
  if (!s) return 'virtual';
  if (s.league === 'real' || s.league === 'ara' || s.league === 'virtual') return s.league;
  if (s.grade === 'A' || s.grade === 'B') return 'real';
  if (s.grade === 'C') return 'ara';
  return 'virtual';
}
var refreshInterval = null;
var refreshCountdown = 30;

function loadSignals() {
  // Try new enriched endpoint first, fallback to existing one
  fetch('/api/signals/open-dashboard')
    .then(function(r) {
      if (!r.ok) throw new Error('new endpoint not available');
      return r.json();
    })
    .then(function(data) {
      allSignals = data.signals || [];
      summaryData = data.summary || {};
      renderSummary();
      renderTable();
      refreshCountdown = 30;
    })
    .catch(function() {
      // Fallback: use existing endpoint and compute P&L client-side
      fetch('/api/learning/signals/open')
        .then(function(r) { return r.json(); })
        .then(function(rawSignals) {
          var openOnly = rawSignals.filter(function(s) { return s.status === 'open'; });
          var enriched = openOnly.map(function(s) {
            var price = s.lastCheckedPrice || s.entry;
            var entry = s.entry;
            var pnlPct = 0;
            var pnlR = 0;

            var entryActive = s.entryHit !== false;
            if (entry && price && entryActive) {
              if (s.direction === 'long') {
                pnlPct = ((price - entry) / entry) * 100;
              } else {
                pnlPct = ((entry - price) / entry) * 100;
              }
              var risk = Math.abs(entry - (s.sl || entry));
              if (risk > 0) {
                var rawPnl = s.direction === 'long' ? (price - entry) : (entry - price);
                pnlR = rawPnl / risk;
              }
            }

            var tpProgress = [];
            var tpHitCheck = function(tpLevel) {
              if (!tpLevel || !isFinite(tpLevel) || !price) return false;
              return s.direction === 'long' ? price >= tpLevel : price <= tpLevel;
            };
            if (s.tp1) tpProgress.push({ level: 'TP1', price: s.tp1, hit: !!s.tp1Hit || tpHitCheck(s.tp1), hitAt: s.tp1HitAt || null });
            if (s.tp2) tpProgress.push({ level: 'TP2', price: s.tp2, hit: !!s.tp2Hit || tpHitCheck(s.tp2), hitAt: s.tp2HitAt || null });
            if (s.tp3) tpProgress.push({ level: 'TP3', price: s.tp3, hit: !!s.tp3Hit || tpHitCheck(s.tp3), hitAt: s.tp3HitAt || null });

            var slDist = entry && s.sl ? Math.abs(price - s.sl) / price * 100 : null;
            var nextTP = null;
            for (var t = 0; t < tpProgress.length; t++) { if (!tpProgress[t].hit) { nextTP = tpProgress[t]; break; } }
            var tpDist = nextTP && price ? Math.abs(nextTP.price - price) / price * 100 : null;
            var ageMinutes = s.createdAt ? Math.round((Date.now() - new Date(s.createdAt).getTime()) / 60000) : null;

            return {
              id: s.id,
              symbol: s.symbol,
              category: s.category,
              direction: s.direction,
              grade: s.grade,
              positionPct: s.position_pct,
              timeframe: s.timeframe,
              entry: entry,
              entrySource: s.entrySource || 'lastbar_close',
              entryHit: s.entryHit !== false,
              entryHitAt: s.entryHitAt || null,
              quotePrice: s.quotePrice,
              sl: s.sl,
              currentPrice: price,
              pnlPct: Math.round(pnlPct * 100) / 100,
              pnlR: Math.round(pnlR * 100) / 100,
              slDistance: slDist ? Math.round(slDist * 100) / 100 : null,
              nextTPDistance: tpDist ? Math.round(tpDist * 100) / 100 : null,
              tpProgress: tpProgress,
              slHit: !!s.slHit,
              highestFavorable: s.highestFavorable,
              lowestAdverse: s.lowestAdverse,
              rr: s.rr,
              ageMinutes: ageMinutes,
              createdAt: s.createdAt,
              lastCheckedAt: s.lastCheckedAt,
              warnings: s.warnings,
            };
          });

          // Sort: A > B > C, then by pnlR desc
          var gradeOrder = { A: 0, B: 1, C: 2, BEKLE: 3, IPTAL: 4 };
          enriched.sort(function(a, b) {
            var gd = (gradeOrder[a.grade] || 9) - (gradeOrder[b.grade] || 9);
            if (gd !== 0) return gd;
            return (b.pnlR || 0) - (a.pnlR || 0);
          });

          var totalOpen = enriched.length;
          var profitable = enriched.filter(function(x) { return x.pnlPct > 0; }).length;
          var losing = enriched.filter(function(x) { return x.pnlPct < 0; }).length;
          var avgPnlPct = totalOpen > 0 ? Math.round(enriched.reduce(function(s, x) { return s + x.pnlPct; }, 0) / totalOpen * 100) / 100 : 0;
          var avgPnlR = totalOpen > 0 ? Math.round(enriched.reduce(function(s, x) { return s + x.pnlR; }, 0) / totalOpen * 100) / 100 : 0;
          var byGrade = {};
          enriched.forEach(function(x) { byGrade[x.grade] = (byGrade[x.grade] || 0) + 1; });
          var byCategory = {};
          enriched.forEach(function(x) { byCategory[x.category] = (byCategory[x.category] || 0) + 1; });

          allSignals = enriched;
          summaryData = { totalOpen: totalOpen, profitable: profitable, losing: losing, avgPnlPct: avgPnlPct, avgPnlR: avgPnlR, byGrade: byGrade, byCategory: byCategory };
          renderSummary();
          updateLeagueCount();
          renderTable();
          refreshCountdown = 30;
        })
        .catch(function(err) {
          console.error('Sinyal yuklenemedi:', err);
        });
    });
}

function computeSummary(list) {
  var totalOpen = list.length;
  // Entry hit olmayanlari P&L ortalamasina dahil etme — henuz aktif pozisyon degil.
  var active = list.filter(function(x) { return x.entryHit !== false; });

  // Live fiyat varsa pnlPct'yi aninda yeniden hesapla — allSignals'daki deger
  // server'dan geldiginden canlı fiyat guncellenmis olabilir.
  function effectivePnl(x) {
    var snap = window.livePrices && window.livePrices[x.symbol];
    var livePrice = snap && isFinite(snap.price) ? snap.price : null;
    if (livePrice != null && x.entry && x.sl) {
      var pct = x.direction === 'long'
        ? ((livePrice - x.entry) / x.entry) * 100
        : ((x.entry - livePrice) / x.entry) * 100;
      var risk = Math.abs(x.entry - x.sl);
      var rawPnl = x.direction === 'long' ? (livePrice - x.entry) : (x.entry - livePrice);
      var r = risk > 0 ? rawPnl / risk : 0;
      return { pnlPct: pct, pnlR: r };
    }
    return { pnlPct: x.pnlPct || 0, pnlR: x.pnlR || 0 };
  }

  var profitable = active.filter(function(x) { return effectivePnl(x).pnlPct > 0; }).length;
  var losing = active.filter(function(x) { return effectivePnl(x).pnlPct < 0; }).length;
  var pending = totalOpen - active.length;
  var sumPnlPct = active.reduce(function(s, x) { return s + effectivePnl(x).pnlPct; }, 0);
  var avgPnlPct = active.length > 0 ? Math.round(sumPnlPct / active.length * 100) / 100 : 0;
  var totalPnlUsd = Math.round(sumPnlPct * 100) / 100; // $100 base => sum of pct == sum of $
  var avgPnlR = active.length > 0 ? Math.round(active.reduce(function(s, x) { return s + effectivePnl(x).pnlR; }, 0) / active.length * 100) / 100 : 0;
  var byGrade = {};
  list.forEach(function(x) { byGrade[x.grade] = (byGrade[x.grade] || 0) + 1; });
  return { totalOpen: totalOpen, profitable: profitable, losing: losing, pending: pending, avgPnlPct: avgPnlPct, avgPnlR: avgPnlR, totalPnlUsd: totalPnlUsd, byGrade: byGrade };
}

function getLeagueList() {
  return allSignals.filter(function(s) {
    if (leagueFilter === 'all') return true;
    return signalLeague(s) === leagueFilter;
  });
}

function renderSummary() {
  var bar = document.getElementById('summaryBar');
  while (bar.firstChild) bar.removeChild(bar.firstChild);
  var s = computeSummary(getFiltered());

  var stats = [
    { label: 'Toplam Acik', value: String(s.totalOpen || 0), cls: 'neutral' },
    { label: 'Entry Bekliyor', value: String(s.pending || 0), cls: 'neutral' },
    { label: 'Karda', value: String(s.profitable || 0), cls: 'positive' },
    { label: 'Zararda', value: String(s.losing || 0), cls: 'negative' },
    { label: 'Ort. P&L %', value: (s.avgPnlPct >= 0 ? '+' : '') + (s.avgPnlPct || 0) + '%', cls: s.avgPnlPct >= 0 ? 'positive' : 'negative' },
    { label: 'Toplam P&L ($)', value: (s.totalPnlUsd >= 0 ? '+$' : '-$') + Math.abs(s.totalPnlUsd || 0).toFixed(2), cls: s.totalPnlUsd >= 0 ? 'positive' : 'negative' },
  ];

  stats.forEach(function(st) {
    var div = el('div', { className: 'summary-stat' }, [
      el('div', { className: 'label', textContent: st.label }),
      el('div', { className: 'value ' + st.cls, textContent: st.value })
    ]);
    bar.appendChild(div);
  });

  // Grade pills
  var pills = el('div', { className: 'grade-pills' });
  var grades = s.byGrade || {};
  ['A', 'B', 'C'].forEach(function(g) {
    if (grades[g]) {
      pills.appendChild(el('span', { className: 'grade-pill ' + g, textContent: g + ': ' + grades[g] }));
    }
  });
  bar.appendChild(pills);
}

var CATEGORY_ALIASES = {
  crypto: 'kripto', kripto: 'kripto',
  forex: 'forex',
  us_stock: 'abd_hisse', abd_hisse: 'abd_hisse',
  bist: 'bist',
  commodity: 'emtia', emtia: 'emtia',
};
function normalizeCategory(c) {
  if (!c) return c;
  var k = String(c).toLowerCase();
  return CATEGORY_ALIASES[k] || k;
}

function getFiltered() {
  var cat = document.getElementById('filterCategory').value;
  var grade = document.getElementById('filterGrade').value;
  var dir = document.getElementById('filterDirection').value;
  var pnl = document.getElementById('filterPnl').value;

  return allSignals.filter(function(s) {
    // 3-tier ladder: league alaniyla filtrele
    if (leagueFilter !== 'all' && signalLeague(s) !== leagueFilter) return false;
    if (cat !== 'all' && normalizeCategory(s.category) !== cat) return false;
    if (grade !== 'all' && s.grade !== grade) return false;
    if (dir !== 'all' && s.direction !== dir) return false;
    if (pnl === 'positive' && s.pnlPct <= 0) return false;
    if (pnl === 'negative' && s.pnlPct >= 0) return false;
    return true;
  });
}

function updateLeagueCount() {
  var realN = 0, araN = 0, virtualN = 0;
  allSignals.forEach(function(s) {
    var lg = signalLeague(s);
    if (lg === 'real') realN++;
    else if (lg === 'ara') araN++;
    else virtualN++;
  });
  var el = document.getElementById('leagueCount');
  if (el) el.textContent = 'Gercek: ' + realN + ' | Ara: ' + araN + ' | Sanal: ' + virtualN + ' | Toplam: ' + allSignals.length;
}

function sortSignals(signals) {
  var key = currentSort.key;
  var asc = currentSort.asc;
  var gradeOrder = { A: 0, B: 1, C: 2, BEKLE: 3, IPTAL: 4 };

  return signals.slice().sort(function(a, b) {
    var va = a[key];
    var vb = b[key];
    if (key === 'grade') { va = gradeOrder[va] || 9; vb = gradeOrder[vb] || 9; }
    if (va == null) va = -Infinity;
    if (vb == null) vb = -Infinity;
    if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb || '').toLowerCase(); }
    if (va < vb) return asc ? -1 : 1;
    if (va > vb) return asc ? 1 : -1;
    return 0;
  });
}

function renderTable() {
  var filtered = getFiltered();
  var sorted = sortSignals(filtered);
  var tbody = document.getElementById('signalBody');
  var empty = document.getElementById('emptyState');
  while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

  if (sorted.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  sorted.forEach(function(s) {
    // Canli fiyat snapshot'i sunucu tarafi currentPrice'tan farkliysa, pnl/R/slDist
    // alanlarini canli fiyata gore yeniden hesapla. Aksi halde hucreler tutarsiz
    // olur (fiyat hucresi canli ama P&L server'in eski lastCheckedPrice'ina baglili).
    try {
      var liveSnap = window.livePrices && window.livePrices[s.symbol];
      var livePrice = liveSnap && isFinite(liveSnap.price) ? liveSnap.price : null;
      if (livePrice != null && s.entry && s.entryHit !== false) {
        var dir = s.direction;
        var newPnlPct = dir === 'long'
          ? ((livePrice - s.entry) / s.entry) * 100
          : ((s.entry - livePrice) / s.entry) * 100;
        var newPnlR = 0;
        var risk = s.sl ? Math.abs(s.entry - s.sl) : 0;
        if (risk > 0) {
          var raw = dir === 'long' ? (livePrice - s.entry) : (s.entry - livePrice);
          newPnlR = raw / risk;
        }
        // TP progress'i canli fiyata gore yeniden degerlendir — outcome checker
        // henuz yazmadiysa canli fiyat TP'yi gecmisse hit=true yap.
        var rebuiltTP = (s.tpProgress || []).map(function(tp) {
          var effHit = tp.hit;
          if (!effHit && tp.price != null && isFinite(tp.price)) {
            effHit = dir === 'long' ? livePrice >= tp.price : livePrice <= tp.price;
          }
          return { level: tp.level, price: tp.price, hit: effHit, hitAt: tp.hitAt };
        });
        s = Object.assign({}, s, {
          currentPrice: livePrice,
          pnlPct: Math.round(newPnlPct * 100) / 100,
          pnlR: Math.round(newPnlR * 100) / 100,
          slDistance: s.sl ? Math.round((Math.abs(livePrice - s.sl) / livePrice * 100) * 100) / 100 : s.slDistance,
          tpProgress: rebuiltTP,
        });
      }
    } catch (_) {}

    var tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.onclick = function() { showDetail(s); };
    // Live price recompute icin satir bazli veri
    tr.setAttribute('data-symbol', s.symbol || '');
    tr.setAttribute('data-entry', s.entry != null ? s.entry : '');
    tr.setAttribute('data-sl', s.sl != null ? s.sl : '');
    tr.setAttribute('data-direction', s.direction || '');
    tr.setAttribute('data-entry-active', s.entryHit !== false ? '1' : '0');

    // Symbol + category
    var tdSym = el('td', {}, [
      el('strong', { textContent: s.symbol }),
      el('span', { textContent: s.category || '', style: { display: 'block', fontSize: '10px', color: 'var(--text2)' } })
    ]);
    tr.appendChild(tdSym);

    // Direction
    tr.appendChild(el('td', {}, [
      el('span', { className: 'badge ' + s.direction, textContent: (s.direction || '').toUpperCase() })
    ]));

    // Grade
    tr.appendChild(el('td', {}, [
      el('span', { className: 'badge grade-' + s.grade, textContent: s.grade + (s.positionPct ? ' %' + s.positionPct : '') })
    ]));

    // Entry + source
    var tdEntry = el('td', { textContent: fmt(s.entry) });
    var srcLabel = s.entrySource === 'ob_zone' ? 'OB' : s.entrySource === 'fvg_zone' ? 'FVG' : s.entrySource === 'ks_entry' ? 'KS' : '';
    if (srcLabel) {
      var srcClass = 'entry-source smart';
      tdEntry.appendChild(el('span', { className: srcClass, textContent: srcLabel }));
    }
    tr.appendChild(tdEntry);

    // Current price — live feed ile guncellenir
    var curTd = el('td', { className: 'live-price-cell', textContent: fmt(s.currentPrice) });
    curTd.setAttribute('data-live-price', s.symbol || '');
    // Snapshot'ta canli fiyat varsa hemen yansit
    if (window.livePrices && window.livePrices[s.symbol]) {
      var snap = window.livePrices[s.symbol];
      while (curTd.firstChild) curTd.removeChild(curTd.firstChild);
      curTd.appendChild(document.createTextNode(formatLivePrice(snap.price)));
      if (snap.marketState === 'PRE' || snap.marketState === 'POST') {
        var msBadge = document.createElement('span');
        msBadge.textContent = snap.marketState;
        msBadge.style.cssText = 'margin-left:4px;font-size:9px;font-weight:bold;padding:1px 3px;border-radius:3px;background:' + (snap.marketState === 'PRE' ? 'rgba(100,181,246,0.25)' : 'rgba(255,183,77,0.25)') + ';color:' + (snap.marketState === 'PRE' ? '#64b5f6' : '#ffb74d') + ';vertical-align:middle';
        curTd.appendChild(msBadge);
      }
    }
    tr.appendChild(curTd);

    // P&L % — entry hit olmadiysa "Bekliyor" goster
    var entryPending = s.entryHit === false;
    var tdPnl;
    if (entryPending) {
      tdPnl = el('td', { className: 'pnl-pct-cell pnl-neutral', textContent: 'Entry bekliyor', style: { fontStyle: 'italic', color: 'var(--text2)' } });
    } else {
      var pnlCls = s.pnlPct > 0 ? 'pnl-positive' : s.pnlPct < 0 ? 'pnl-negative' : 'pnl-neutral';
      tdPnl = el('td', { className: 'pnl-pct-cell ' + pnlCls });
      var pnlSpan = el('span', { className: 'pnl-pct-text', textContent: (s.pnlPct > 0 ? '+' : '') + s.pnlPct + '%' });
      tdPnl.appendChild(pnlSpan);
      var bar = el('div', { className: 'progress-bar' });
      var fill = el('div', { className: 'fill pnl-pct-fill ' + (s.pnlPct >= 0 ? 'positive' : 'negative') });
      fill.style.width = Math.min(Math.abs(s.pnlPct) * 10, 100) + '%';
      bar.appendChild(fill);
      tdPnl.appendChild(bar);
    }
    tr.appendChild(tdPnl);

    // P&L R
    var tdPnlR;
    if (entryPending) {
      tdPnlR = el('td', { className: 'pnl-r-cell pnl-neutral', textContent: '—', style: { color: 'var(--text2)' } });
    } else {
      var pnlUsd = Number(s.pnlPct) || 0;
      var pnlUsdCls = pnlUsd > 0 ? 'pnl-positive' : pnlUsd < 0 ? 'pnl-negative' : 'pnl-neutral';
      tdPnlR = el('td', { className: 'pnl-r-cell ' + pnlUsdCls, textContent: (pnlUsd >= 0 ? '+$' : '-$') + Math.abs(pnlUsd).toFixed(2) });
    }
    tr.appendChild(tdPnlR);

    // SL distance
    var slColor = s.slDistance != null && s.slDistance < 1 ? 'var(--red)' : 'var(--text)';
    tr.appendChild(el('td', { className: 'sl-dist-cell', textContent: s.slDistance != null ? s.slDistance + '%' : '-', style: { color: slColor } }));

    // TP progress dots
    var tdTP = document.createElement('td');
    var dotsDiv = el('div', { className: 'tp-dots' });
    (s.tpProgress || []).forEach(function(tp) {
      var dot = el('div', { className: 'tp-dot ' + (tp.hit ? 'hit' : 'pending'), textContent: tp.level.replace('TP', ''), title: tp.level + ': ' + fmt(tp.price) + (tp.hit ? ' (ulasildi)' : '') });
      dotsDiv.appendChild(dot);
    });
    if (s.slHit) {
      dotsDiv.appendChild(el('div', { className: 'tp-dot sl-hit', textContent: 'SL' }));
    }
    tdTP.appendChild(dotsDiv);
    tr.appendChild(tdTP);

    // Age
    tr.appendChild(el('td', { className: 'age', textContent: formatAge(s.ageMinutes) }));

    // R:R
    tr.appendChild(el('td', { textContent: s.rr || '-', style: { color: 'var(--text2)' } }));

    // Durum — reverse / trailing / refresh badges
    var statusTd = document.createElement('td');
    var statusWrap = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '2px' } });
    if (s.reverseAttemptCount > 0) {
      statusWrap.appendChild(el('span', {
        className: 'badge',
        textContent: 'REVERSE ' + s.reverseAttemptCount,
        style: { background: '#ff9800', color: '#000', fontSize: '10px' },
        title: 'Acikken ' + s.reverseAttemptCount + ' zit yon sinyal geldi — SL tetiklenirse hatali trade sayilir',
      }));
    }
    if (s.trailingStopActive) {
      statusWrap.appendChild(el('span', {
        className: 'badge',
        textContent: 'TRAIL @ ' + fmt(s.trailingStopLevel || s.sl),
        style: { background: '#4caf50', color: '#fff', fontSize: '10px' },
        title: 'Trailing stop aktif — karda SL yukselir',
      }));
    }
    if (s.refreshCount > 0) {
      statusWrap.appendChild(el('span', {
        textContent: '↻ ' + s.refreshCount,
        style: { color: 'var(--text2)', fontSize: '10px' },
        title: 'Sinyal ' + s.refreshCount + ' kez yenilendi (upsert)',
      }));
    }
    statusTd.appendChild(statusWrap);
    tr.appendChild(statusTd);

    // Aksiyon — manuel kapatma butonu
    var actionTd = document.createElement('td');
    var closeBtn = el('button', {
      textContent: 'Kapat',
      style: { background: '#c62828', color: '#fff', border: 'none', padding: '4px 10px', borderRadius: '4px', cursor: 'pointer', fontSize: '11px' },
    });
    closeBtn.onclick = function(ev) {
      ev.stopPropagation();
      closeSignal(s.id, s.symbol, s.direction);
    };
    actionTd.appendChild(closeBtn);
    tr.appendChild(actionTd);

    tbody.appendChild(tr);
  });

  // Update sort arrows
  document.querySelectorAll('.signal-table th').forEach(function(th) {
    var arrow = th.querySelector('.sort-arrow');
    if (!arrow) return;
    var key = th.getAttribute('data-sort');
    if (key === currentSort.key) {
      arrow.textContent = currentSort.asc ? ' \u25B2' : ' \u25BC';
    } else {
      arrow.textContent = '';
    }
  });
}

function closeSignal(id, symbol, direction) {
  var msg = symbol + ' ' + (direction || '').toUpperCase() + ' pozisyonunu elle kapatmak istediginizden emin misiniz?';
  if (!confirm(msg)) return;
  fetch('/api/signals/' + encodeURIComponent(id) + '/close', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ reason: 'manual_ui' }),
  })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result && result.ok) {
        loadSignals();
      } else {
        alert('Kapatma hatasi: ' + (result && result.error ? result.error : 'bilinmeyen'));
      }
    })
    .catch(function(e) { alert('Kapatma hatasi: ' + e.message); });
}

function cleanupDuplicates() {
  if (!confirm('Mukerrer acik sinyalleri temizlemek istediginizden emin misiniz?\n\nHer sembol+yon icin sadece en iyi kalite+en yeni sinyal kalir.')) return;
  fetch('/api/signals/cleanup-duplicates', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result && result.ok) {
        alert('Temizlik tamamlandi:\n' + result.cleaned + ' mukerrer kapatildi,\n' + result.kept + ' tekil sinyal kaldi.');
        loadSignals();
      } else {
        alert('Temizlik hatasi: ' + (result && result.error ? result.error : 'bilinmeyen'));
      }
    })
    .catch(function(e) { alert('Temizlik hatasi: ' + e.message); });
}

function showDetail(s) {
  // Live fiyat varsa modal'daki tum turev alanlari (currentPrice, P&L, SL mesafesi,
  // TP progress) anlik fiyata gore yeniden hesapla. Aksi halde kart sunucunun eski
  // verisini gosterir.
  try {
    var liveSnap = window.livePrices && window.livePrices[s.symbol];
    var livePrice = liveSnap && isFinite(liveSnap.price) ? liveSnap.price : null;
    if (livePrice != null && s.entry && s.entryHit !== false) {
      var dir = s.direction;
      var newPnlPct = dir === 'long'
        ? ((livePrice - s.entry) / s.entry) * 100
        : ((s.entry - livePrice) / s.entry) * 100;
      var risk = s.sl ? Math.abs(s.entry - s.sl) : 0;
      var newPnlR = risk > 0
        ? (dir === 'long' ? (livePrice - s.entry) : (s.entry - livePrice)) / risk
        : 0;
      var tpHitCheck = function(tp) {
        if (tp == null || !isFinite(tp)) return false;
        return dir === 'long' ? livePrice >= tp : livePrice <= tp;
      };
      var rebuiltTP = (s.tpProgress || []).map(function(tp) {
        var effHit = tp.hit || tpHitCheck(tp.price);
        return { level: tp.level, price: tp.price, hit: effHit, hitAt: tp.hitAt };
      });
      s = Object.assign({}, s, {
        currentPrice: livePrice,
        pnlPct: Math.round(newPnlPct * 100) / 100,
        pnlR: Math.round(newPnlR * 100) / 100,
        slDistance: s.sl ? Math.round((Math.abs(livePrice - s.sl) / livePrice * 100) * 100) / 100 : s.slDistance,
        tpProgress: rebuiltTP,
      });
    }
  } catch (_) {}

  var modal = document.getElementById('detailModal');
  var content = document.getElementById('detailContent');
  while (content.firstChild) content.removeChild(content.firstChild);

  // Close button
  var closeBtn = el('button', { className: 'detail-close', textContent: 'x' });
  closeBtn.onclick = function() { modal.classList.remove('visible'); };
  content.appendChild(closeBtn);

  // Header
  var h2 = document.createElement('h2');
  h2.appendChild(document.createTextNode(s.symbol + ' '));
  var dirColor = s.direction === 'long' ? 'var(--green)' : 'var(--red)';
  h2.appendChild(el('span', { textContent: (s.direction || '').toUpperCase(), style: { color: dirColor } }));
  h2.appendChild(document.createTextNode(' '));
  h2.appendChild(el('span', { className: 'badge grade-' + s.grade, textContent: s.grade }));
  content.appendChild(h2);

  var entryPending = s.entryHit === false;
  var rows = [
    ['Kategori', s.category],
    ['Zaman Dilimi', s.timeframe],
    ['Entry', fmt(s.entry)],
    ['Entry Kaynak', s.entrySource || 'lastbar_close'],
    ['Durum', entryPending ? 'Entry bekliyor' : 'Pozisyon aktif'],
    ['Entry Tetiklendi', s.entryHitAt ? new Date(s.entryHitAt).toLocaleString('tr-TR') : (entryPending ? '— (bekliyor)' : '-')],
    ['Guncel Fiyat', fmt(s.currentPrice)],
    ['P&L %', entryPending ? '— (entry bekliyor)' : (s.pnlPct > 0 ? '+' : '') + s.pnlPct + '%'],
    ['P&L ($)', entryPending ? '— (entry bekliyor)' : (s.pnlPct >= 0 ? '+$' : '-$') + Math.abs(Number(s.pnlPct) || 0).toFixed(2)],
    ['SL', fmt(s.sl)],
    ['SL Uzaklik', s.slDistance != null ? s.slDistance + '%' : '-'],
    ['R:R', s.rr || '-'],
    ['Yas', formatAge(s.ageMinutes)],
    ['Olusturulma', s.createdAt ? new Date(s.createdAt).toLocaleString('tr-TR') : '-'],
    ['Son Kontrol', s.lastCheckedAt ? new Date(s.lastCheckedAt).toLocaleString('tr-TR') : '-'],
  ];

  rows.forEach(function(r) {
    var valStyle = {};
    if (r[0].indexOf('P&L') === 0 && !entryPending) {
      valStyle.color = parseFloat(r[1]) >= 0 ? 'var(--green)' : 'var(--red)';
      valStyle.fontWeight = 'bold';
    }
    if (r[0] === 'Durum') {
      valStyle.color = entryPending ? 'var(--yellow, #e0a64a)' : 'var(--green)';
      valStyle.fontWeight = 'bold';
    }
    content.appendChild(el('div', { className: 'detail-row' }, [
      el('span', { className: 'dlabel', textContent: r[0] }),
      el('span', { textContent: r[1], style: valStyle })
    ]));
  });

  // TP levels
  if (s.tpProgress && s.tpProgress.length > 0) {
    content.appendChild(el('div', { textContent: 'TP Seviyeleri', style: { marginTop: '12px', fontSize: '11px', color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.5px' } }));

    s.tpProgress.forEach(function(tp) {
      var statusText;
      if (tp.hit) {
        if (tp.hitAt) {
          statusText = 'Ulasildi: ' + new Date(tp.hitAt).toLocaleString('tr-TR');
        } else {
          // Canli fiyat TP'yi gecti ama outcome checker henuz yazmadi
          statusText = 'Ulasildi (onay bekliyor)';
        }
      } else {
        statusText = 'Bekliyor';
      }
      content.appendChild(el('div', { className: 'detail-row' }, [
        el('span', { className: 'dlabel', textContent: tp.level }),
        el('span', { textContent: fmt(tp.price) + ' \u2014 ' + statusText, style: { color: tp.hit ? 'var(--green)' : 'var(--text2)' } })
      ]));
    });
  }

  // Trailing stop info
  if (s.trailingStopActive) {
    content.appendChild(el('div', {
      textContent: 'TRAILING STOP AKTIF: ' + fmt(s.trailingStopLevel || s.sl) + ' (TP1 sonrasi)',
      style: { marginTop: '12px', padding: '8px', background: 'rgba(76, 175, 80, 0.15)', border: '1px solid #4caf50', borderRadius: '4px', color: '#4caf50', fontSize: '12px' },
    }));
  }

  // Reverse attempts panel
  if (s.reverseAttempts && s.reverseAttempts.length > 0) {
    content.appendChild(el('div', {
      textContent: 'Zit Yon Sinyalleri (' + s.reverseAttempts.length + '):',
      style: { marginTop: '12px', fontSize: '11px', color: '#ff9800', textTransform: 'uppercase', letterSpacing: '0.5px' },
    }));
    content.appendChild(el('div', {
      textContent: 'Pozisyon acikken karsi yon sinyal geldi. SL tetiklenirse bu trade "hatali" olarak isaretlenir.',
      style: { fontSize: '10px', color: 'var(--text2)', padding: '2px 0 6px' },
    }));
    s.reverseAttempts.forEach(function(r) {
      var when = r.at ? new Date(r.at).toLocaleString('tr-TR') : '-';
      var line = when + ' \u2014 ' + (r.grade || '') + '-' + (r.direction || '').toUpperCase() + ' ' + (r.timeframe || '') + 'TF @ ' + fmt(r.entry);
      content.appendChild(el('div', {
        textContent: '\u2022 ' + line,
        style: { fontSize: '11px', color: '#ffcc80', padding: '2px 0' },
      }));
    });
  }

  // Faulty trade analysis (resolved signals only)
  if (s.faultyTrade && s.faultyTradeAnalysis) {
    content.appendChild(el('div', {
      textContent: 'HATALI TRADE',
      style: { marginTop: '12px', padding: '8px', background: 'rgba(198, 40, 40, 0.2)', border: '1px solid #c62828', borderRadius: '4px', color: '#ef9a9a', fontSize: '12px', fontWeight: 'bold' },
    }));
    var fa = s.faultyTradeAnalysis;
    [
      ['Acilirken', fa.openedWithGrade + '-' + s.direction + ' ' + fa.openedWithTF + 'TF'],
      ['Dinlenmeyen reverse', fa.ignoredReverseCount + ' (gradeler: ' + (fa.ignoredReverseGrades || []).join(',') + ')'],
      ['Ilk reverse lag', fa.firstReverseLagMinutes + ' dk'],
    ].forEach(function(r) {
      content.appendChild(el('div', { className: 'detail-row' }, [
        el('span', { className: 'dlabel', textContent: r[0] }),
        el('span', { textContent: r[1] }),
      ]));
    });
    if (fa.indicatorDrift && fa.indicatorDrift.changed && Object.keys(fa.indicatorDrift.changed).length > 0) {
      content.appendChild(el('div', {
        textContent: 'Indikator Sapmasi:',
        style: { marginTop: '8px', fontSize: '11px', color: 'var(--text2)' },
      }));
      Object.entries(fa.indicatorDrift.changed).forEach(function(pair) {
        content.appendChild(el('div', {
          textContent: '\u2022 ' + pair[0] + ': ' + pair[1],
          style: { fontSize: '11px', color: '#ef9a9a', padding: '2px 0' },
        }));
      });
    }
  }

  // TP/SL kaynak (dayanak) — 2026-05-04
  var basisRows = [];
  if (s.slReason) basisRows.push(['SL Dayanak', s.slReason]);
  else if (s.slSource) basisRows.push(['SL Kaynak', s.slSource]);
  if (s.tp1Source) basisRows.push(['TP1 Dayanak', s.tp1Source]);
  if (s.tp2Source) basisRows.push(['TP2 Dayanak', s.tp2Source]);
  if (s.tp3Source) basisRows.push(['TP3 Dayanak', s.tp3Source]);
  if (basisRows.length) {
    content.appendChild(el('div', { textContent: 'TP / SL Dayanak', style: { marginTop: '12px', fontSize: '11px', color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.5px' } }));
    basisRows.forEach(function(r) {
      content.appendChild(el('div', { className: 'detail-row' }, [
        el('span', { className: 'dlabel', textContent: r[0] }),
        el('span', { textContent: r[1], style: { fontSize: '11px', color: 'var(--text)' } }),
      ]));
    });
  }
  if (s.strategicCandidates && s.strategicCandidates.length) {
    content.appendChild(el('div', { textContent: 'Stratejik Hedef Adaylari', style: { marginTop: '8px', fontSize: '10px', color: 'var(--text2)' } }));
    s.strategicCandidates.slice(0, 6).forEach(function(c) {
      content.appendChild(el('div', {
        textContent: '• ' + (c.price != null ? Number(c.price).toFixed(4) : '-') + ' | ' + (c.distR != null ? c.distR + 'R' : '?') + ' | conf ' + (c.confluence || 1) + ' | ' + (c.label || ''),
        style: { fontSize: '10px', color: 'var(--text2)', padding: '1px 0' },
      }));
    });
  }

  // Reasoning (sinyal acilma gerekceleri) — vote-iliskili satirlari OYLAMA
  // blokuna birak; burada yalniz BAGLAM (HTF, barrier, rejim wrapper, MTF
  // uyum, gate, per-symbol rule, vol tier) gosterilsin. Aksi halde MACD/EMA/
  // SMC/CDV/ADX gibi vote satirlari iki yerde tekrarlanip karisikliga sebep
  // oluyordu (2026-05-15 fix).
  if (s.reasoning && s.reasoning.length > 0) {
    // Vote-iliskili satirlari atmak icin pattern (insan-cümle olan ama
    // yapisal voteBreakdown'da zaten gosterilen kaynaklarin acklimalari).
    var VOTE_REASON_PATTERNS = [
      /^MACD/, /^EMA Cross/, /^EMA \d+/, /^RSI \d/, /^RSI cross/, /^Stoch/i,
      /^ADX \d/, /^DMI:/, /^SMC (BOS|CHoCH|OB|FVG):/i, /^CDV:/i,
      /^Formasyon/i, /^Squeeze/i, /^Divergence/i, /^Volume (spike|reaction|confirm)/i,
      /^Macro/i, /^VWAP/i, /^KhanSaab/, /^Liquidity Sweep/i,
      /^Premium\/Discount/i, /^Golden zone/i, /^EQH\/EQL/i, /^RSI failure/i,
      /^Oylama:/, /^---\s*Oylama:/, /^Vol tier/i,
    ];
    var contextLines = s.reasoning.filter(function(r) {
      return !VOTE_REASON_PATTERNS.some(function(rx) { return rx.test(r); });
    });

    // Bağlam'ı IKIYE ayır:
    //  • IMPACT  → gerçekten karar mantığını değiştiren (HTF Level/Fib/Barrier
    //             filter rejection+SL/TP move, HTF counter-trend conviction
    //             kırpma, Rejim wrapper vote suppress/boost, Vol tier eşik ×).
    //  • ADVISORY → 2026-05'te advisory yapılan (HTF GATE, MTF uyumu, per-symbol
    //             rule, computeRegime newPositionAllowed): grade'e dokunmuyor,
    //             sadece archive instrumentation icin yazılıyor.
    var ADVISORY_PATTERNS = [
      /^\s*HTF\s+GATE/i,
      /^MTF uyumu /i,
      /per-symbol rule/i,
      /^\s*computeRegime/i,
      /HTF counter-trend.*bilgi notu/i,  // "bilgi notu, BEKLE'ye dusurulmedi" - conviction zaten ust satirda kırpıldı
      /advisory, BEKLE\'ye dusurulmedi/i,
      /advisory, grade korundu/i,
      /^\s*\[Trendline\]/i,  // Trendline advisory — grade/vote'a etki yok
    ];
    var impact = [], advisory = [];
    contextLines.forEach(function(r) {
      if (ADVISORY_PATTERNS.some(function(rx) { return rx.test(r); })) advisory.push(r);
      else impact.push(r);
    });

    if (impact.length > 0) {
      var rsHeader = el('div', {
        textContent: 'Baglam — Karari Etkileyen (' + impact.length + ') — tikla ac/kapat',
        style: { marginTop: '12px', fontSize: '11px', color: 'var(--blue)', textTransform: 'uppercase', letterSpacing: '0.5px', cursor: 'pointer', userSelect: 'none' },
        title: 'HTF Level filter (SL/TP/iptal), HTF counter-trend conviction kırpma, Rejim wrapper vote suppress, Vol tier esik carpani — bunlar grade veya entry/SL/TP hesabını degistirir',
      });
      var rsBox = el('div', { style: { display: 'none', marginTop: '4px' } });
      impact.forEach(function(r) {
        rsBox.appendChild(el('div', {
          textContent: '• ' + r,
          style: { fontSize: '11px', color: 'var(--text)', padding: '2px 0', lineHeight: '1.4' },
        }));
      });
      rsHeader.onclick = function() { rsBox.style.display = rsBox.style.display === 'none' ? 'block' : 'none'; };
      content.appendChild(rsHeader);
      content.appendChild(rsBox);
    }

    if (advisory.length > 0) {
      var avHeader = el('div', {
        textContent: 'Izleme / Advisory (' + advisory.length + ') — grade etkisi yok — tikla ac/kapat',
        style: { marginTop: '8px', fontSize: '10px', color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.5px', cursor: 'pointer', userSelect: 'none' },
        title: 'HTF GATE, MTF uyumu, per-symbol rule, computeRegime: 2026-05\'te advisory yapildi. Grade veya SL/TP\'ye dokunmaz, sadece arsive yazilir (ogrenme kalibrasyonu icin).',
      });
      var avBox = el('div', { style: { display: 'none', marginTop: '4px', opacity: 0.7 } });
      advisory.forEach(function(r) {
        avBox.appendChild(el('div', {
          textContent: '◦ ' + r,
          style: { fontSize: '10px', color: 'var(--text2)', padding: '1px 0', lineHeight: '1.4', fontStyle: 'italic' },
        }));
      });
      avHeader.onclick = function() { avBox.style.display = avBox.style.display === 'none' ? 'block' : 'none'; };
      content.appendChild(avHeader);
      content.appendChild(avBox);
    }
  }

  // Temel Analiz (sadece ABD hisseleri; bilgi amacli)
  if (s.fundamentalSnapshot) {
    var f = s.fundamentalSnapshot;
    var stanceLabel = { positive: 'Pozitif', neutral: 'Notr', negative: 'Negatif', unknown: 'Bilinmiyor' };
    var stanceColor = { positive: 'var(--green)', negative: 'var(--red)', neutral: 'var(--text2)', unknown: 'var(--text2)' };
    var faHeader = el('div', {
      textContent: 'Temel Analiz — ' + (stanceLabel[f.overall] || 'Bilinmiyor') + (f.freshness ? ' (' + f.freshness + ')' : '') + ' — tikla ac/kapat',
      style: { marginTop: '10px', fontSize: '11px', color: stanceColor[f.overall] || 'var(--blue)', textTransform: 'uppercase', letterSpacing: '0.5px', cursor: 'pointer', userSelect: 'none' },
    });
    var faBox = el('div', { style: { display: 'none', marginTop: '4px' } });
    if (f.asOf || f.fiscalPeriod) {
      faBox.appendChild(el('div', {
        textContent: (f.asOf ? 'asOf: ' + String(f.asOf).slice(0, 10) : '') + (f.fiscalPeriod ? ' · donem: ' + f.fiscalPeriod : ''),
        style: { fontSize: '10px', color: 'var(--text2)', padding: '2px 0 4px' },
      }));
    }
    (f.sections || []).forEach(function(sec) {
      var col = stanceColor[sec.stance] || 'var(--text2)';
      var row = el('div', { style: { display: 'flex', justifyContent: 'space-between', gap: '8px', padding: '2px 0', fontSize: '11px' } }, [
        el('span', { textContent: sec.label, style: { color: 'var(--text)' } }),
        el('strong', { textContent: stanceLabel[sec.stance] || 'Bilinmiyor', style: { color: col, minWidth: '70px', textAlign: 'right' } }),
      ]);
      faBox.appendChild(row);
      if (sec.summary) {
        faBox.appendChild(el('div', {
          textContent: sec.summary,
          style: { fontSize: '10px', color: 'var(--text2)', padding: '0 0 4px 4px', lineHeight: '1.4' },
        }));
      }
    });
    faHeader.onclick = function() { faBox.style.display = faBox.style.display === 'none' ? 'block' : 'none'; };
    content.appendChild(faHeader);
    content.appendChild(faBox);
  }

  // Vote breakdown + tally
  if ((s.voteBreakdown && s.voteBreakdown.length) || s.tally) {
    var vbHeader = el('div', {
      textContent: 'Oylama' + (s.tally ? ' — ' + (s.tally.direction || '?').toUpperCase() + ' kanaat ' + (s.tally.conviction != null ? s.tally.conviction : '?') + ' / uyum %' + (s.tally.agreement != null ? s.tally.agreement : '?') : '') + ' — tikla ac/kapat',
      style: { marginTop: '10px', fontSize: '11px', color: 'var(--blue)', textTransform: 'uppercase', letterSpacing: '0.5px', cursor: 'pointer', userSelect: 'none' },
    });
    var vbBox = el('div', { style: { display: 'none', marginTop: '4px' } });
    if (s.tally) {
      vbBox.appendChild(el('div', {
        textContent: 'Long: ' + (s.tally.longScore != null ? s.tally.longScore : '?') + ' | Short: ' + (s.tally.shortScore != null ? s.tally.shortScore : '?') + ' | Oy sayisi: ' + (s.tally.voterCount != null ? s.tally.voterCount : '?'),
        style: { fontSize: '11px', color: 'var(--text2)', padding: '3px 0 6px' },
      }));
    }
    // Shadow havuzdan live'a promote edilmis indikatorler (2026-05-15).
    // Bu listeyi koruyacaksak signal-grader DEFAULT_VOTE_WEIGHTS ile esit
    // tutun. Live oylamada normal kaynaklarla esit muamele gorur; sadece
    // gorsel etiket ile farkindalik artirir.
    var PROMOTED_SHADOW = { golden_zone: 1, eq_liquidity: 1, rsi_failure_swing: 1 };
    (s.voteBreakdown || []).forEach(function(v) {
      var dirCol = v.direction === 'long' ? 'var(--green)' : v.direction === 'short' ? 'var(--red)' : 'var(--text2)';
      var isPromoted = !!PROMOTED_SHADOW[v.source];
      var line = (v.source || '?') + ' (' + (v.direction || 'amplifier') + ', w=' + (v.weight != null ? v.weight : '?') + ')';
      var row = el('div', { style: { fontSize: '11px', color: dirCol, padding: '2px 0', display: 'flex', alignItems: 'center', gap: '6px' } });
      row.appendChild(el('span', { textContent: '• ' + line }));
      if (isPromoted) {
        row.appendChild(el('span', {
          textContent: 'shadow→live',
          title: 'Shadow havuzdan canli oylamaya promote edildi (2026-05-15). Live indicator-scorer suredeginde olcumu yapiyor.',
          style: { fontSize: '9px', padding: '1px 5px', borderRadius: '3px', background: 'var(--blue)', color: 'white', letterSpacing: '0.3px' },
        }));
      }
      vbBox.appendChild(row);
    });
    vbHeader.onclick = function() { vbBox.style.display = vbBox.style.display === 'none' ? 'block' : 'none'; };
    content.appendChild(vbHeader);
    content.appendChild(vbBox);
  }

  // Trendline — cizgiyi tanimlayan capa noktalari + tarihleri, temas noktalari,
  // yukselen/dusen kategorizasyonu. Advisory: grade'e etki yok.
  if (s.trendlineContext && (s.trendlineContext.support || s.trendlineContext.resistance)) {
    var tlDate = function(t) {
      if (t == null) return '?';
      var ms = Number(t) < 1e12 ? Number(t) * 1000 : Number(t);
      var d = new Date(ms);
      return isNaN(d.getTime()) ? '?' : d.toLocaleString('tr-TR', {
        day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit',
      });
    };
    var tlKindLabel = {
      rising_support: 'Yukselen Destek', falling_resistance: 'Dusen Direnc',
      rising_resistance: 'Yukselen Direnc', falling_support: 'Dusen Destek',
    };
    // Renk rol'e gore: tavan (direnc) kirmizi, taban (destek) yesil — egimden bagimsiz.
    var tlKindColor = {
      rising_support: 'var(--green)', falling_resistance: 'var(--red)',
      rising_resistance: 'var(--red)', falling_support: 'var(--green)',
    };

    var tlHeader = el('div', {
      textContent: 'Trendline — temas noktalari & kategori — tikla ac/kapat',
      style: { marginTop: '12px', fontSize: '11px', color: 'var(--blue)', textTransform: 'uppercase', letterSpacing: '0.5px', cursor: 'pointer', userSelect: 'none' },
    });
    var tlBox = el('div', { style: { display: 'none', marginTop: '4px' } });

    // Guven %70 altindaki trendline'lar kartta gosterilmez — dusuk guvenli /
    // stale cizgiler (or. ileriye uzatilip fiyattan kopmus) kullaniciyi
    // yaniltmasin. Esik motorun da uyguladigi posterior reddine ek emniyet.
    var TL_MIN_CONFIDENCE = 0.70;
    var renderTrendline = function(tl) {
      if (!tl) return;
      if (!(typeof tl.confidence === 'number' && tl.confidence >= TL_MIN_CONFIDENCE)) return;
      var col = tlKindColor[tl.type] || 'var(--text2)';
      var statusBits = [];
      statusBits.push(tl.confirmed ? 'Onayli (' + tl.touchCount + ' temas)' : 'Aday (' + tl.touchCount + ' temas)');
      if (tl.broken) {
        statusBits.push('KIRILMIS (kapanisla, son bar)');
      } else if (tl.recentCloseBreak) {
        statusBits.push('Gecmiste kirildi (' + tl.recentCloseBreak.ageBars + ' bar once)');
      }
      if (tl.pierced) {
        // posteriorPierceCount tam sayi, posteriorPierces slice(-5)'lik son N
        var pierceTotal = tl.posteriorPierceCount != null
          ? tl.posteriorPierceCount
          : (tl.posteriorPierces ? tl.posteriorPierces.length : '?');
        statusBits.push('Wick delinmis (' + pierceTotal + ' nokta)');
      }
      if (tl.tooSteep) statusBits.push('cok dik');

      tlBox.appendChild(el('div', {
        textContent: (tlKindLabel[tl.type] || tl.type) + ' — ' + statusBits.join(' · '),
        style: { marginTop: '6px', fontSize: '11px', fontWeight: 'bold', color: col },
      }));

      var slopeDir = tl.slope > 0 ? 'yukari egimli' : tl.slope < 0 ? 'asagi egimli' : 'yatay';
      [
        ['Kategori', (tl.slope > 0 ? 'Yukselen' : 'Dusen') + ' trend (' + slopeDir + ')'],
        ['Guven', tl.confidence != null ? '%' + Math.round(tl.confidence * 100) : '-'],
        ['Cizgi guncel deger', fmt(tl.currentValue) + (tl.distancePct != null ? ' (fiyat ' + (tl.distancePct >= 0 ? '+' : '') + tl.distancePct.toFixed(2) + '% uzakta)' : '')],
      ].forEach(function(r) {
        tlBox.appendChild(el('div', { className: 'detail-row' }, [
          el('span', { className: 'dlabel', textContent: r[0] }),
          el('span', { textContent: r[1], style: { fontSize: '11px' } }),
        ]));
      });

      // Capa noktalari — cizgiyi tanimlayan 2 pivot
      tlBox.appendChild(el('div', {
        textContent: 'Capa noktalari (cizgiyi tanimlar):',
        style: { fontSize: '10px', color: 'var(--text2)', padding: '4px 0 2px' },
      }));
      (tl.points || []).forEach(function(p, i) {
        tlBox.appendChild(el('div', {
          textContent: '• P' + (i + 1) + ': ' + tlDate(p.time) + ' @ ' + fmt(p.price),
          style: { fontSize: '11px', color: 'var(--text)', padding: '1px 0' },
        }));
      });

      // Temas noktalari — cizgiye degen tum pivotlar
      if (tl.touches && tl.touches.length) {
        tlBox.appendChild(el('div', {
          textContent: 'Temas noktalari (' + tl.touches.length + '):',
          style: { fontSize: '10px', color: 'var(--text2)', padding: '4px 0 2px' },
        }));
        tl.touches.forEach(function(p) {
          tlBox.appendChild(el('div', {
            textContent: '◦ ' + tlDate(p.time) + ' @ ' + fmt(p.price),
            style: { fontSize: '11px', color: col, padding: '1px 0' },
          }));
        });
      }

      // Wick pierce noktalari — P2 sonrasi cizgiyi fitille delen barlar (close temiz).
      if (tl.posteriorPierces && tl.posteriorPierces.length) {
        var totalPierces = tl.posteriorPierceCount != null ? tl.posteriorPierceCount : tl.posteriorPierces.length;
        var shownLabel = totalPierces > tl.posteriorPierces.length
          ? tl.posteriorPierces.length + '/' + totalPierces + ' gosteriliyor (son ' + tl.posteriorPierces.length + ')'
          : totalPierces;
        tlBox.appendChild(el('div', {
          textContent: 'Wick ihlal noktalari (' + shownLabel + ' — close temiz):',
          style: { fontSize: '10px', color: 'var(--text2)', padding: '4px 0 2px' },
        }));
        tl.posteriorPierces.forEach(function(p) {
          tlBox.appendChild(el('div', {
            textContent: '⚠ ' + tlDate(p.time) + ' @ ' + fmt(p.price) + ' (cizgi ' + fmt(p.lineValue) + ', tasma ' + fmt(p.distance) + ')',
            style: { fontSize: '11px', color: '#e0a64a', padding: '1px 0' },
          }));
        });
      }

      // Son kapanis kirilimi (gecmiste) — broken=false ama recentCloseBreak dolu.
      if (tl.recentCloseBreak) {
        var rcb = tl.recentCloseBreak;
        var rcbDir = rcb.direction === 'up' ? 'yukari' : rcb.direction === 'down' ? 'asagi' : (rcb.direction || '?');
        tlBox.appendChild(el('div', {
          textContent: 'Son kapanis kirilimi: ' + tlDate(rcb.time) + ' @ ' + fmt(rcb.price) + ' (cizgi ' + fmt(rcb.lineValue) + ', ' + rcb.ageBars + ' bar once, yon: ' + rcbDir + ')',
          style: { fontSize: '11px', color: tl.broken ? 'var(--red)' : '#e0a64a', padding: '4px 0 2px', fontStyle: 'italic' },
        }));
      }

      // Esik ozeti — kullanici cizginin hangi toleranslarla degerlendirildigini gorsun.
      if (tl.thresholds) {
        var th = tl.thresholds;
        tlBox.appendChild(el('div', {
          textContent: 'Esikler — ATR ' + fmt(th.atr) + ' · temas ' + fmt(th.touch) + ' · interior reject ' + fmt(th.interiorHardReject) + ' · wick pierce ' + fmt(th.posteriorPierce) + ' · close break ' + fmt(th.closeBreak),
          style: { fontSize: '10px', color: 'var(--text2)', padding: '4px 0 0', lineHeight: '1.4' },
        }));
      }
    };

    renderTrendline(s.trendlineContext.support);
    renderTrendline(s.trendlineContext.resistance);

    // Trendline Plan Adaylari (Commit 2) — respect_pullback / breakout_retest
    // ADVISORY: bunlar gercek emir plani DEGIL, trendline-tabanli setup adaylari.
    // Grader entry/SL'ini etkilemez. Olcum/observation amacli.
    // Plan etiketleri rol-bazli (egim isaretinden bagimsiz). Cizginin gercek tipi
    // (yukselen/dusen) plan kayit satirinda `Tip` olarak ayrica gosterilir, boylece
     // yukselen_direnc/dusen_destek gibi yeni tipler de dogru sunulur.
    var planLabels = {
      respect_pullback_long: 'Destege geri donus (long)',
      respect_pullback_short: 'Direnge geri donus (short)',
      breakout_retest_long: 'Kirilan direncin retest\'i (long)',
      breakout_retest_short: 'Kirilan destegin retest\'i (short)',
    };
    var planCandidates = s.trendlineContext.trendlinePlanCandidates || [];
    if (planCandidates.length) {
      tlBox.appendChild(el('div', {
        textContent: 'Trendline Plan Adaylari (advisory — grade\'e etki yok):',
        style: { fontSize: '10px', color: 'var(--blue)', padding: '8px 0 2px', textTransform: 'uppercase', letterSpacing: '0.3px' },
      }));
      planCandidates.forEach(function(p) {
        var label = planLabels[p.planType] || p.planType;
        var dirCol = p.direction === 'long' ? 'var(--green)' : 'var(--red)';
        tlBox.appendChild(el('div', {
          textContent: '▸ ' + label,
          style: { fontSize: '11px', color: dirCol, padding: '4px 0 1px', fontWeight: 'bold' },
        }));
        // p.source artik gercek cizgi tipini tasiyor (rising_support / falling_support /
        // rising_resistance / falling_resistance). Etikete tip adini da ekle.
        var typeNameTr = tlKindLabel[p.source] || p.source || '?';
        var parts = [
          'Tip: ' + typeNameTr,
          'Entry ' + fmt(p.entry),
          'SL ' + fmt(p.sl),
          'Risk %' + (p.riskPct != null ? p.riskPct : '-'),
          'Cizgi ' + fmt(p.lineValue),
        ];
        if (p.breakAgeBars != null) parts.push('Kirilim yasi ' + p.breakAgeBars + ' bar');
        if (p.lineConfidence != null) parts.push('Cizgi guven %' + Math.round(p.lineConfidence * 100));
        tlBox.appendChild(el('div', {
          textContent: parts.join(' · '),
          style: { fontSize: '11px', color: 'var(--text)', padding: '1px 0 1px 12px', lineHeight: '1.4' },
        }));
        if (p.linePierced || p.lineBrokenNow) {
          var warns = [];
          if (p.lineBrokenNow) warns.push('cizgi su an kirik');
          if (p.linePierced) warns.push('wick delinmis');
          tlBox.appendChild(el('div', {
            textContent: '   uyari: ' + warns.join(', '),
            style: { fontSize: '10px', color: '#e0a64a', padding: '1px 0 2px 12px', fontStyle: 'italic' },
          }));
        }
      });
    }

    // Trendline motorundan gelen sistem warning'leri (pencere yetersizligi vb.)
    var tlEngineWarnings = s.trendlineContext.warnings || [];
    if (tlEngineWarnings.length) {
      tlBox.appendChild(el('div', {
        textContent: 'Trendline motoru uyarilari:',
        style: { fontSize: '10px', color: 'var(--orange, #e0a64a)', padding: '6px 0 2px', textTransform: 'uppercase', letterSpacing: '0.3px' },
      }));
      tlEngineWarnings.forEach(function(w) {
        tlBox.appendChild(el('div', {
          textContent: '⚠ ' + w,
          style: { fontSize: '10px', color: 'var(--yellow, #e0a64a)', padding: '1px 0' },
        }));
      });
    }

    var tlNotes = (s.trendlineContext.notes || []).concat(s.trendlineContext.riskFlags || []);
    if (tlNotes.length) {
      tlBox.appendChild(el('div', {
        textContent: 'Notlar:',
        style: { fontSize: '10px', color: 'var(--text2)', padding: '6px 0 2px' },
      }));
      tlNotes.forEach(function(n) {
        tlBox.appendChild(el('div', {
          textContent: '• ' + n,
          style: { fontSize: '10px', color: 'var(--text2)', padding: '1px 0', fontStyle: 'italic' },
        }));
      });
    }

    // Iki cizgi de gizlendiyse ve plan/not/uyari da yoksa basligi hic gosterme.
    if (tlBox.childNodes.length) {
      tlHeader.onclick = function() { tlBox.style.display = tlBox.style.display === 'none' ? 'block' : 'none'; };
      content.appendChild(tlHeader);
      content.appendChild(tlBox);
    }
  }

  // Warnings
  if (s.warnings && s.warnings.length > 0) {
    content.appendChild(el('div', { textContent: 'Uyarilar:', style: { marginTop: '12px', fontSize: '11px', color: 'var(--orange)' } }));
    s.warnings.forEach(function(w) {
      content.appendChild(el('div', { textContent: '\u2022 ' + w, style: { fontSize: '11px', color: 'var(--yellow)', padding: '2px 0' } }));
    });
  }

  // Elle kapat butonu (modal icinde)
  if (s.id) {
    var modalCloseBtn = el('button', {
      textContent: 'Pozisyonu Elle Kapat',
      style: { marginTop: '16px', width: '100%', padding: '10px', background: '#c62828', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer', fontSize: '13px' },
    });
    modalCloseBtn.onclick = function() {
      modal.classList.remove('visible');
      closeSignal(s.id, s.symbol, s.direction);
    };
    content.appendChild(modalCloseBtn);
  }

  modal.classList.add('visible');
}

function fmt(v) {
  if (v == null) return '-';
  var n = Number(v);
  if (isNaN(n)) return '-';
  if (n === 0) return '0';
  var abs = Math.abs(n);
  if (abs >= 100) return n.toFixed(2);
  if (abs >= 1) return n.toFixed(4);
  if (abs >= 0.0001) return n.toFixed(6);
  // Micro-priced tokens (PEPE, SHIB, BONK...) — 4 anlamli basamak goster
  var digits = Math.min(12, Math.max(6, 2 - Math.floor(Math.log10(abs)) + 3));
  return n.toFixed(digits).replace(/0+$/, '').replace(/\.$/, '');
}

function formatAge(minutes) {
  if (minutes == null) return '-';
  if (minutes < 60) return minutes + 'dk';
  if (minutes < 1440) return Math.floor(minutes / 60) + 's ' + (minutes % 60) + 'dk';
  return Math.floor(minutes / 1440) + 'g ' + Math.floor((minutes % 1440) / 60) + 's';
}

// --- Live Price Feed (Binance WS via scanner server) ---
window.livePrices = window.livePrices || {};

function cssEscapeAttr(s) { return String(s).replace(/(["\\])/g, '\\$1'); }
function formatLivePrice(p) {
  if (p == null || !isFinite(p)) return '—';
  if (p >= 1000) return p.toFixed(2);
  if (p >= 1) return p.toFixed(3);
  if (p >= 0.01) return p.toFixed(4);
  return p.toFixed(6);
}

function applyLivePriceToDom(tvSymbol, price, prevPrice) {
  var snap = window.livePrices && window.livePrices[tvSymbol];
  var marketState = snap && snap.marketState;
  // 1) Guncel fiyat hucreleri
  var cells = document.querySelectorAll('[data-live-price="' + cssEscapeAttr(tvSymbol) + '"]');
  for (var i = 0; i < cells.length; i++) {
    var cell = cells[i];
    // Fiyat metni + PRE/POST badge
    while (cell.firstChild) cell.removeChild(cell.firstChild);
    cell.appendChild(document.createTextNode(formatLivePrice(price)));
    if (marketState === 'PRE' || marketState === 'POST') {
      var badge = document.createElement('span');
      badge.textContent = marketState;
      badge.style.cssText = 'margin-left:4px;font-size:9px;font-weight:bold;padding:1px 3px;border-radius:3px;background:' + (marketState === 'PRE' ? 'rgba(100,181,246,0.25)' : 'rgba(255,183,77,0.25)') + ';color:' + (marketState === 'PRE' ? '#64b5f6' : '#ffb74d') + ';vertical-align:middle';
      cell.appendChild(badge);
    }
    if (prevPrice != null && prevPrice !== price) {
      cell.classList.remove('flash-up', 'flash-down');
      void cell.offsetWidth;
      cell.classList.add(price > prevPrice ? 'flash-up' : 'flash-down');
    }
  }
  // 2) Ayni satirdaki P&L%, P&L (R), SL Uzaklik hucrelerini yeniden hesapla
  var rows = document.querySelectorAll('tr[data-symbol="' + cssEscapeAttr(tvSymbol) + '"]');
  for (var r = 0; r < rows.length; r++) {
    recomputeRowMetrics(rows[r], price);
  }
}

function recomputeRowMetrics(tr, price) {
  var entry = parseFloat(tr.getAttribute('data-entry'));
  var sl = parseFloat(tr.getAttribute('data-sl'));
  var direction = tr.getAttribute('data-direction');
  var entryActive = tr.getAttribute('data-entry-active') === '1';
  if (!isFinite(entry) || entry <= 0 || !isFinite(price) || price <= 0) return;

  // P&L %
  var pnlPct = 0;
  if (entryActive) {
    pnlPct = direction === 'long'
      ? ((price - entry) / entry) * 100
      : ((entry - price) / entry) * 100;
  }
  pnlPct = Math.round(pnlPct * 100) / 100;

  // P&L R
  var pnlR = 0;
  if (entryActive && isFinite(sl) && sl > 0) {
    var risk = Math.abs(entry - sl);
    if (risk > 0) {
      var raw = direction === 'long' ? (price - entry) : (entry - price);
      pnlR = Math.round((raw / risk) * 100) / 100;
    }
  }

  // SL uzaklik %
  var slDist = null;
  if (isFinite(sl) && sl > 0) {
    slDist = Math.round((Math.abs(price - sl) / price * 100) * 100) / 100;
  }

  // P&L % hucresini guncelle
  var pnlCell = tr.querySelector('.pnl-pct-cell');
  if (pnlCell && entryActive) {
    var pnlText = pnlCell.querySelector('.pnl-pct-text');
    if (pnlText) pnlText.textContent = (pnlPct > 0 ? '+' : '') + pnlPct + '%';
    pnlCell.classList.remove('pnl-positive', 'pnl-negative', 'pnl-neutral');
    pnlCell.classList.add(pnlPct > 0 ? 'pnl-positive' : pnlPct < 0 ? 'pnl-negative' : 'pnl-neutral');
    var fill = pnlCell.querySelector('.pnl-pct-fill');
    if (fill) {
      fill.classList.remove('positive', 'negative');
      fill.classList.add(pnlPct >= 0 ? 'positive' : 'negative');
      fill.style.width = Math.min(Math.abs(pnlPct) * 10, 100) + '%';
    }
  }

  // P&L $ hucresini guncelle ($100 tabanli — pnlPct dolar olarak)
  var pnlRCell = tr.querySelector('.pnl-r-cell');
  if (pnlRCell && entryActive) {
    pnlRCell.textContent = (pnlPct >= 0 ? '+$' : '-$') + Math.abs(pnlPct).toFixed(2);
    pnlRCell.classList.remove('pnl-positive', 'pnl-negative', 'pnl-neutral');
    pnlRCell.classList.add(pnlPct > 0 ? 'pnl-positive' : pnlPct < 0 ? 'pnl-negative' : 'pnl-neutral');
  }

  // SL uzaklik hucresini guncelle
  var slCell = tr.querySelector('.sl-dist-cell');
  if (slCell && slDist != null) {
    slCell.textContent = slDist + '%';
    slCell.style.color = slDist < 1 ? 'var(--red)' : 'var(--text)';
  }
}

var _summaryRefreshTimer = null;
function scheduleSummaryRefresh() {
  if (_summaryRefreshTimer) return;
  _summaryRefreshTimer = setTimeout(function() {
    _summaryRefreshTimer = null;
    renderSummary();
  }, 500);
}

function handleLivePriceUpdates(updates) {
  for (var i = 0; i < updates.length; i++) {
    var u = updates[i];
    if (!u || !u.tvSymbol) continue;
    var prev = window.livePrices[u.tvSymbol];
    window.livePrices[u.tvSymbol] = { price: u.price, ts: u.ts, marketState: u.marketState || null };
    applyLivePriceToDom(u.tvSymbol, u.price, prev ? prev.price : null);
  }
  scheduleSummaryRefresh();
}

function connectLivePriceWS() {
  var proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  var ws;
  try { ws = new WebSocket(proto + '//' + window.location.host); } catch (e) { return; }
  ws.onmessage = function(e) {
    try {
      var data = JSON.parse(e.data);
      if (data && data.type === 'live_prices' && data.updates) {
        handleLivePriceUpdates(data.updates);
      }
    } catch (_) {}
  };
  ws.onclose = function() { setTimeout(connectLivePriceWS, 3000); };
  ws.onerror = function() { try { ws.close(); } catch (_) {} };
}

function loadInitialLivePrices() {
  fetch('/api/live-prices').then(function(r) { return r.json(); }).then(function(d) {
    if (!d || !d.prices) return;
    Object.keys(d.prices).forEach(function(tv) {
      var p = d.prices[tv].price;
      var prev = window.livePrices[tv];
      window.livePrices[tv] = { price: p, ts: d.prices[tv].ts, marketState: d.prices[tv].marketState || null };
      applyLivePriceToDom(tv, p, prev ? prev.price : null);
    });
  }).catch(function() {});
}

connectLivePriceWS();
setTimeout(loadInitialLivePrices, 500);
setInterval(loadInitialLivePrices, 30000); // WS kopuksa safety net
